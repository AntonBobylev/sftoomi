services:
    server:
        image: nginx:stable-alpine
        container_name: sftoomi_server
        restart: always
        ports:
            - ${SERVER_PORT:-8080}:80
        volumes:
            - ../.:/var/www/project
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
            - mysql
        networks:
            - sftoomi

    php:
        container_name: sftoomi_php
        restart: always
        build:
            context: .
            dockerfile: ./php/Dockerfile
            args:
                USER_ID: "${USER_ID}"
                GROUP_ID: "${GROUP_ID}"
                USER_NAME: "${USER_NAME}"
        ports:
            - ${PHP_PORT:-9000}:9000
            - "4200:4200"
        volumes:
            - ../.:/var/www/project
            - ./php/ini/php.ini:/usr/local/etc/php/php.ini
        networks:
            - sftoomi

    mysql:
        image: mysql:8
        container_name: sftoomi_mysql
        ports:
            - ${MYSQL_PORT:-3306}:3306
        volumes:
            - ${MYSQL_DB_FOLDER_PATH:-./mysql}:/var/lib/mysql
        command: --mysql-native-password=ON --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        networks:
            - sftoomi

    redis:
        image: redis:7-alpine
        container_name: sftoomi_redis
        restart: always
        ports:
            - "${REDIS_PORT}:6379"
        networks:
            - sftoomi

networks:
    sftoomi:
