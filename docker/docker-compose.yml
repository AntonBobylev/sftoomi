services:
    server:
        image: nginx:stable-alpine
        container_name: server
        restart: always
        ports:
            - ${SERVER_PORT:-8080}:80
        volumes:
            - ../.:/var/www/project
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
            - mysql
        networks:
            - server-php-mysql

    php:
        container_name: php
        restart: always
        build:
            context: .
            dockerfile: ./php/Dockerfile
        ports:
            - ${PHP_PORT:-9000}:9000
        volumes:
            - ../.:/var/www/project
            - ./php/ini:/usr/local/etc/php
        networks:
            - server-php-mysql

    mysql:
        image: mysql:8
        container_name: mysql
        ports:
            - ${MYSQL_PORT:-3306}:3306
        volumes:
            - ${MYSQL_DB_FOLDER_PATH:-./mysql}:/var/lib/mysql
        command: --mysql-native-password=ON --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        networks:
            - server-php-mysql

networks:
    server-php-mysql:
