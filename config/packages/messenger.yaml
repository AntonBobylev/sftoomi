framework:
    messenger:
        default_bus: messenger.bus.default

        buses:
            messenger.bus.default:
                default_middleware:
                    enabled: true
                    allow_no_handlers: false
                middleware:
                    - 'App\Class\Messenger\DeduplicationMiddleware'

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    table_name: 'messenger_messages'
                    queue_name: 'default'
                    auto_setup: true
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            sync: 'sync://'

        routing:
            'App\Class\Messenger\User\ResetPassword\Message': async
