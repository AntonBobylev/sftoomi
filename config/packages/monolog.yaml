monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - mailer
        - messenger

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                formatter: monolog.formatter.simple
                channels: ["!event", "!mailer", "!messenger"]
            messenger:
                type: stream
                path: "%kernel.logs_dir%/messenger.log"
                level: debug
                formatter: monolog.formatter.simple
                channels: [ "messenger" ]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]
            mailer:
                type: stream
                path: "%kernel.logs_dir%/mailer.log"
                level: debug
                channels: [ "mailer" ]
                formatter: monolog.formatter.simple

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event", "!mailer", "!messenger"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event", "!mailer", "!messenger"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            messenger:
                type: stream
                path: php://stderr
                level: info
                channels: [ "messenger" ]
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            mailer:
                type: stream
                path: "%kernel.logs_dir%/mailer.log"
                level: error
                channels: [ "mailer" ]
                formatter: monolog.formatter.simple
