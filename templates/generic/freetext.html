<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">

        <style>
            .wrapper {
                width: 100%;
                text-align: center;
                font-family: Arial, sans-serif;
            }

            .header-info {
                display: inline-block;
                text-align: left;

                line-height: 1.5;
                margin-top: 20px;
            }

            .row {
                white-space: nowrap;
            }

            .main {
                padding-top: 30px;

                textarea {
                    min-height: 150px;
                    max-height: 300px;
                    width: 100%;
                    resize: none;
                }
            }
        </style>

        <title></title>
    </head>
    <body>
        <div class="wrapper">
            <div class="header-info">
                <div class="row">Patient: ${patient_name}</div>
                <div class="row">Examination: ${examination_id}</div>
                <div class="row">Exam: ${exam_id}</div>
                <div class="row">Doctor: ${doctor_name}</div>
                <div class="row">Study: ${study_short_name}</div>
            </div>
            <div class="main">
                <label>
                    <textarea></textarea>
                </label>
            </div>
        </div>
    </body>
</html>
