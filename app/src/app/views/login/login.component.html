<div class="wrapper">
    <language-switcher />

    <app-loading-spinner [isLoading]="isLoading()" />
    <div class="form-wrapper">
        <div class="form"
             (keydown)="$event.key === 'Enter' && form.valid ? onLogonClick() : null"
        >
            <div class="header">SFTOOMI</div>

            <app-textfield name="login"
                           [form]="form"
                           [label]="Sftoomi.Translator.translate('views.login.login')"
            />

            <app-textfield name="password"
                           [form]="form"
                           [label]="Sftoomi.Translator.translate('views.login.password')"
                           [securedInput]="true"
            />

            <div style="display: flex; width: 100%; justify-content: flex-end;">
                <a nz-button
                   nzType="link"
                   (click)="onResetPasswordClick($event)"
                >
                    {{ Sftoomi.Translator.translate('views.login.reset_password') }}
                </a>
            </div>

            <button nz-button
                    nzType="primary"
                    [disabled]="form.invalid"
                    style="margin-top: 10px"
                    (click)="onLogonClick()"
            >
                {{ Sftoomi.Translator.translate('views.login.logon') }}
            </button>
        </div>
    </div>
</div>
