{{ dialogResizer() }}

<div class="wrapper"
     [formGroup]="form"
>
    <app-textfield name="last_name"
                   [form]="form"
                   [label]="Sftoomi.Translator.translate('last_name')"
                   [useUppercase]="true"
    />

    <app-textfield name="first_name"
                   [form]="form"
                   [label]="Sftoomi.Translator.translate('first_name')"
                   [useUppercase]="true"
    />

    <app-textfield name="middle_name"
                   [form]="form"
                   [label]="Sftoomi.Translator.translate('middle_name')"
                   [useUppercase]="true"
    />

    <app-item-selector #facilitiesItemSelectorCtrl
                       [label]="Sftoomi.Translator.translate('views.referring_doctors.dialog.facilities')"
                       [required]="true"
    />

    <div *nzModalFooter>
        <button nz-button
                nzType="primary"
                nzShape="round"
                [disabled]="isSaveButtonDisabled()"
                (click)="save()"
        >
            {{ Sftoomi.Translator.translate('save') }}
        </button>
    </div>
</div>
