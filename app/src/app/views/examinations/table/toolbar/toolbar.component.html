<div>
    <button nz-button
            nzType="default"
            nzShape="circle"
            [disabled]="table.isLoadingNow()"
            (click)="onAddClick($event)"
            [nz-tooltip]="Sftoomi.Translator.translate('add')"
            [class.hidden]="!Sftoomi.Auth.permissions.isAllowed('EXAMINATIONS_MODULE::ADD')"
    >
        <nz-icon nzType="plus" />
    </button>
    <button nz-button
            nzType="default"
            nzShape="circle"
            [disabled]="table.isLoadingNow()"
            (click)="onEditClick($event)"
            [nz-tooltip]="Sftoomi.Translator.translate('edit')"
            [class.hidden]="!Sftoomi.Auth.permissions.isAllowed('EXAMINATIONS_MODULE::EDIT')"
    >
        <nz-icon nzType="edit" />
    </button>
    <button nz-button
            nzType="default"
            nzShape="circle"
            [disabled]="table.isLoadingNow()"
            (click)="onRemoveClick()"
            [nz-tooltip]="Sftoomi.Translator.translate('remove')"
            [class.hidden]="!Sftoomi.Auth.permissions.isAllowed('EXAMINATIONS_MODULE::REMOVE')"
    >
        <nz-icon nzType="delete" />
    </button>
    <button nz-button
            nzType="default"
            nzShape="circle"
            [disabled]="table.isLoadingNow()"
            (click)="onRefreshClick()"
            [nz-tooltip]="Sftoomi.Translator.translate('refresh')"
            [class.hidden]="!Sftoomi.Auth.permissions.isAllowed('EXAMINATIONS_MODULE')"
    >
        <nz-icon nzType="retweet" />
    </button>
</div>
