<tui-loader
    [inheritColor]="true"
    [overlay]="true"
    style="height: 100%;"
    [showLoader]="isLoading()"
>
    <div class="wrapper">
        <div style="height: 50%; overflow: auto;">
            <app-code-editor [(code)]="templateCode"
                             language="html"
                             [placeholder]="Sftoomi.Translator.translate('views.template.code_editor.placeholder')"
            />
        </div>

        <div style="display: flex; width: 100%; height: 50%;justify-content: center; align-items: center; overflow: auto">
            <app-html-preview [code]="templateCode" />
        </div>
    </div>
</tui-loader>
