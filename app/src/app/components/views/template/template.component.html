<div class="wrapper">
    <div style="height: 50%;">
        <ngs-code-editor [theme]="Sftoomi.Theme.isDarkMode()() ? 'vs-dark' : 'vs'"
                         style="height: 100%;"
                         [codeModel]="model"
                         [options]="options"
                         (valueChanged)="onCodeChanged($event)"
        ></ngs-code-editor>
    </div>

    <div style="display: flex; width: 100%; height: 50%;justify-content: center; align-items: center;"
         [innerHTML]="templateCode() | safe"
    >
    </div>
</div>
