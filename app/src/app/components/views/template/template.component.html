<div class="wrapper">
    <div style="height: 50%; overflow: auto;">
        <code-editor [(ngModel)]="templateCode"
                     [languages]="languages"
                     language="html"
                     [theme]="Sftoomi.Theme.isDarkMode()() ? 'dark' : 'light'"
                     placeholder="Type template code here"
                     indentWithTab
        />
    </div>

    <div style="display: flex; width: 100%; height: 50%;justify-content: center; align-items: center; overflow: auto"
         [innerHTML]="templateCode | safe"
    >
    </div>
</div>
