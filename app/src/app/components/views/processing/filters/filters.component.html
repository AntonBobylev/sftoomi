<tui-loader [overlay]="true"
            [showLoader]="isLoading()"
>
    <form [formGroup]="form"
          class="main-form"
    >
        <div class="day-selector-wrapper">
            <div class="day-selector-calendar-wrapper">
                <tui-calendar [value]="examinationDate"
                              (dayClick)="onExaminationDateClick($event)"
                              [markerHandler]="examinationCalendarMarkerHandler"
                />
            </div>

            <div class="day-selector-wrapper-buttons-area">
                <button
                    size="s"
                    tuiButton
                    type="button"
                    (click)="onTodayClick()"
                >
                    {{ Sftoomi.Translator.translate('today') }}
                </button>
            </div>
        </div>

        <tui-textfield>
            <label tuiLabel>{{ Sftoomi.Translator.translate('views.processing.filters.examination_id') }}</label>
            <input
                formControlName="examination_id"
                tuiInputNumber
            />

            <tui-error formControlName="examination_id"
                       [error]="[] | tuiFieldError | async"
            />
        </tui-textfield>

        <div
            tuiAppearance="flat"
            tuiButtonGroup
        >
            <button type="button"
                    (click)="clearForm()"
            >
                <tui-icon icon="@tui.eraser" />
                {{ Sftoomi.Translator.translate('clear') }}
            </button>
            <button type="button"
                    (click)="onSearch.emit(getValues())"
            >
                <tui-icon icon="@tui.search" />
                {{ Sftoomi.Translator.translate('search') }}
            </button>
        </div>
    </form>
</tui-loader>
