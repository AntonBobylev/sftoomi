<tui-loader
    [inheritColor]="true"
    [overlay]="true"
    [showLoader]="isLoading()"
>
    <div class="wrapper"
         [formGroup]="form"
    >
        <div class="main">
            <tui-textfield>
                <label tuiLabel>{{ Sftoomi.Translator.translate('id') }}</label>
                <input
                    formControlName="patient_id"
                    tuiInputNumber
                />

                <tui-error formControlName="patient_id"
                           [error]="[] | tuiFieldError | async"
                />
            </tui-textfield>
            <patient-demographics-template [controls]="getPatientTemplateControls()"/>
        </div>

        <div class="actions">
            <button
                tuiButton
                appearance="flat"
                iconStart="check"
                type="button"
                [disabled]="form.invalid"
                (click)="save()"
            >
                {{ Sftoomi.Translator.translate('save') }}
            </button>
        </div>
    </div>
</tui-loader>
