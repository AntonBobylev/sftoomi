<div class="wrapper">
    <tui-loader
        [inheritColor]="true"
        [overlay]="true"
        [showLoader]="isLoading()"
    >
        <div tuiAppearance="action"
             tuiButtonGroup
        >
            <button type="button">
                <tui-icon icon="@tui.plus" />
                Add
            </button>
            <button type="button">
                <tui-icon icon="@tui.pencil" />
                Edit
            </button>
            <button type="button">
                <tui-icon icon="@tui.minus" />
                Remove
            </button>
        </div>

        <table tuiTable
               [columns]="columns"
        >
            <thead>
                <tr tuiThGroup>
                    <th tuiTh
                        [resizable]="true"
                    >
                        ID
                    </th>
                    <th tuiTh
                        [resizable]="true"
                    >
                        Last name
                    </th>
                    <th tuiTh
                        [resizable]="true"
                    >
                        First name
                    </th>
                    <th tuiTh
                        [resizable]="true"
                    >
                        Middle name
                    </th>
                    <th tuiTh
                        [resizable]="true"
                    >
                        Date of birth
                    </th>
                </tr>
            </thead>
            <tbody tuiTbody
                   [data]="data()"
            >
                <tr *ngFor="let patient of data()"
                    tuiTr
                >
                    <td
                        *tuiCell="'dob'"
                        tuiTd
                    >
                        {{ Sftoomi.dateShort(patient.dob.date) }}
                    </td>
                </tr>
            </tbody>
        </table>
    </tui-loader>
</div>
