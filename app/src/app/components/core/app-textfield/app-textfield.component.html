<nz-form-item [formGroup]="form">
    <nz-form-label [nzRequired]="Sftoomi.isFieldRequired(form, name)"
                   [nzFor]="name"
    >
        {{ label }}
    </nz-form-label>
    <nz-form-control [nzErrorTip]="errorTipTpl">
        <nz-input-group [nzSuffix]="fieldSuffixTpl">
            <input nz-input
                   [type]="getFieldType()"
                   [formControlName]="name"
                   (input)="onInput($event)"
                   [id]="name"
            />

            <ng-template #fieldSuffixTpl
                         [ngTemplateOutlet]="clearTpl"
                         [ngTemplateOutletContext]="{control: form.get(name)}"
            >
            </ng-template>
        </nz-input-group>

        <ng-template #errorTipTpl>
            <form-error-template [fieldName]="name"
                                 [parentFormGroup]="form"
            />
        </ng-template>
    </nz-form-control>
</nz-form-item>


<ng-template #clearTpl
             let-control='control'
>
    @if (securedInput) {
        <nz-icon
            class="ant-input-password-icon"
            [nzType]="isSecuredInputVisible ? 'eye-invisible' : 'eye'"
            (click)="isSecuredInputVisible = !isSecuredInputVisible"
        />
    }

    @if (control?.value) {
        <i nz-icon
           class="ant-input-clear-icon"
           nzTheme="fill"
           nzType="close-circle"
           (click)="control?.reset()"
        ></i>
    }
</ng-template>
