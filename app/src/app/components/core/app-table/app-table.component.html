@if (toolbar) {
    <div [style.height]="toolbarHeight">
        <ng-container *ngComponentOutlet="toolbar;
                                          inputs: { table: this }"
        />
    </div>
}

<div class="content">
    @if (isLoading()) {
        <div class="spinner-message-wrapper">
            <app-loading-spinner [isLoading]="isLoading()" />
        </div>
    } @else if (Sftoomi.isEmpty(data())) {
        <span class="no-data-caption">{{ noDataCaption }}</span>
    } @else {
        <nz-table [nzData]="data()"
                  [nzLoading]="isLoading()"
                  [nzBordered]="isBordered"
                  [nzTotal]="total()"
                  [nzNoResult]="noDataCaption"
                  [nzScroll]="{ y: 'calc(100vh - 160px)' }"
                  [nzPageSize]="pageSize"
                  [nzPageIndex]="currentPageIndex"
                  (nzPageIndexChange)="onPageIndexChange($event)"
                  (nzPageSizeChange)="onPageSizeChange($event)"
                  [nzShowPagination]="usePagination"
                  nzShowSizeChanger
        >
            @if (Sftoomi.responsiveLayoutService?.isSmallWidth()) {
                <app-table-card-view #viewCtrl
                                     class="table-view"
                                     [table]="this"
                                     [data]="data"
                                     [columns]="columns"
                                     [selectionRequired]="selectionRequired"
                />
            } @else {
                <app-table-row-view #viewCtrl
                                    class="table-view"
                                    [table]="this"
                                    [data]="data"
                                    [columns]="columns"
                                    [selectionRequired]="selectionRequired"
                />
            }
        </nz-table>
    }
</div>
