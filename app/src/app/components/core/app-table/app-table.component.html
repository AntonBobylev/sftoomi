@if (toolbar) {
    <div [style.height]="toolbarHeight">
        <ng-container *ngComponentOutlet="toolbar;
                                          inputs: { table: this }"
        />
    </div>
}

<nz-table [nzData]="data()"
          [nzLoading]="isLoading()"
          [nzBordered]="isBordered"
          [nzTotal]="total()"
          [nzNoResult]="noDataCaption"
          [nzScroll]="{ y: 'calc(100vh - 160px)' }"
          [nzPageSize]="pageSize"
          [nzPageIndex]="currentPageIndex"
          (nzPageIndexChange)="onPageIndexChange($event)"
          (nzPageSizeChange)="onPageSizeChange($event)"
          nzShowPagination
          nzShowSizeChanger
          [style.height]="getTableHeight()"
>
    <thead>
        <tr>
            @for (column of columns; track column.name) {
                <th [nzWidth]="column.header.widthPx ? column.header.widthPx + 'px' : null">
                    <span class="cell"
                          [ngStyle]="column.header.extraStyles"
                    >
                        {{ column.header.caption }}
                    </span>
                </th>
            }
        </tr>
    </thead>
    <tbody>
        @for (row of data(); track row + $index) {
            <tr>
                @for (column of columns; track column.name) {
                    <td>
                        <span class="cell"
                              [ngStyle]="column.dataCell?.extraStyles ?? null"
                        >
                            {{ row[column.name] }}
                        </span>
                    </td>
                }
            </tr>
        }
    </tbody>
</nz-table>
