<nz-table #headerTable [nzData]="data()"
          [nzPageSize]="50"
          [nzScroll]="{ y: '240px' }"
>
    <thead>
        <tr>
            @for(column of columns(); track column.name) {
                <th [nzWidth]="column.header.widthPx ?? null">{{ column.header.caption | safe }}</th>
            }
        </tr>
    </thead>
    <tbody>
        @for (data of headerTable.data; track data) {
            <tr>
                <td>{{ data.name }}</td>
                <td>{{ data.age }}</td>
                <td>{{ data.address }}</td>
            </tr>
        }
    </tbody>
</nz-table>
