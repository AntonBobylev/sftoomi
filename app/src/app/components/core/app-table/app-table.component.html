<nz-table [nzData]="data()"
          [nzLoading]="isLoading()"
          [nzBordered]="isBordered"
          [nzTotal]="getTotalRowsCount()"
          [nzNoResult]="noDataCaption"
          [nzScroll]="{ x: '100%', y: '100%' }"
>
    <thead>
        <tr>
            @for(column of columns; track column.name) {
                <th [nzWidth]="column.header.widthPx ?? null">{{ column.header.caption }}</th>
            }
        </tr>
    </thead>
    <tbody>
        @for (row of data(); track row) {
            <tr>
                @for(column of getColumnsNames(); track column) {
                    <td>{{ row[column] }}</td>
                }
            </tr>
        }
    </tbody>
</nz-table>
