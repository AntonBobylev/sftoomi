@if (toolbar) {
    <div [style.height]="toolbarHeight">
        <ng-container *ngComponentOutlet="toolbar;
                                          inputs: { table: this }"
        />
    </div>
}

<nz-table [nzData]="data()"
          [nzLoading]="isLoading()"
          [nzBordered]="isBordered"
          [nzTotal]="total()"
          [nzNoResult]="noDataCaption"
          [nzScroll]="{ y: 'calc(100vh - 160px)' }"
          [nzPageSize]="pageSize"
          [nzPageIndex]="currentPageIndex"
          (nzPageIndexChange)="onPageIndexChange($event)"
          (nzPageSizeChange)="onPageSizeChange($event)"
          nzShowPagination
          nzShowSizeChanger
          [style.height]="getTableHeight()"
>
    <thead>
        <tr>
            @if (selectionRequired) {
                <th [nzChecked]="selectionInHeaderChecked"
                    [nzIndeterminate]="selectionInHeaderIntermediate"
                    [nz-tooltip]="Sftoomi.Translator.translate('select_all')"
                    (nzCheckedChange)="onAllChecked($event)"
                    style="width: 40px"
                ></th>
            }
            @for (column of columns; track column.name) {
                <th style="width: {{ column.width }}">
                    <span class="cell"
                          [ngStyle]="column.header.extraStyles"
                    >
                        <span [nz-tooltip]="column.header.tooltipRenderer ? column.header.tooltipRenderer() : null">
                            {{ column.header.caption }}
                        </span>
                    </span>
                </th>
            }
        </tr>
    </thead>
    <tbody>
        @for (row of data(); track row + $index) {
            <tr>
                <td
                    [nzChecked]="row.selected"
                    (nzCheckedChange)="onRowCheck($event, row)"
                ></td>

                @for (column of columns; track column.name) {
                    <td>
                        <div class="cell"
                             [style.max-width]="column.width"
                             [ngStyle]="column.dataCell?.extraStyles ?? null"
                             [nz-tooltip]="column.dataCell?.tooltipRenderer ? column.dataCell?.tooltipRenderer(row) : null"
                        >
                            @if (column.rawHtml) {
                                <span [innerHTML]="row[column.name] | safe"
                                      style="max-height: 100px; overflow: auto; width: 100%;"
                                ></span>
                            } @else {
                                <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap">
                                    {{ row[column.name] }}
                                </span>
                            }
                        </div>
                    </td>
                }
            </tr>
        }
    </tbody>
</nz-table>
