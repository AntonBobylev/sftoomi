<tui-loader
    [inheritColor]="true"
    [overlay]="true"
    [showLoader]="isLoading()"
>
    @if (toolbar) {
        <div class="toolbar">
            <ng-container *ngComponentOutlet="toolbar;
                                              inputs: { table: this }"
            />
        </div>
    }

    <div class="wrapper"
         [style.height]="toolbar ?  'calc(100% - 30px)' : '100%'"
    >
        <table tuiTable
               [columns]="columnsNames"
        >
            <thead>
                <tr tuiThGroup>
                    @for (column of columns; track column.name) {
                        <th tuiTh
                            [resizable]="column.resizable ?? true"
                        >
                            @if (column.name === 'selection' && selectionRequired) {
                                <input
                                    tuiCheckbox
                                    type="checkbox"
                                    [ngModel]="checked"
                                    (ngModelChange)="onCheck($event)"
                                />
                            } @else {
                                {{ column.caption }}
                            }
                        </th>
                    }
                </tr>
            </thead>
            <tbody tuiTbody
                   [data]="data()"
            >
                <tr
                    *ngFor="let row of data()"
                    tuiTr
                >
                    <ng-container *ngFor="let col of columns">
                        <td *tuiCell="col.name"
                            tuiTd
                        >
                            @if (col.name === 'selection' && selectionRequired) {
                                <input
                                    tuiCheckbox
                                    type="checkbox"
                                    [(ngModel)]="row.selected"
                                />
                            } @else {
                                {{ row[col.name]}}
                            }
                        </td>
                    </ng-container>
                </tr>
            </tbody>
        </table>
    </div>
</tui-loader>
