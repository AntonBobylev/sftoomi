<tui-loader
    [inheritColor]="true"
    [overlay]="true"
    [showLoader]="isLoading()"
>
    @if (toolbar) {
        <div [style.height]="toolbarHeight">
            <ng-container *ngComponentOutlet="toolbar;
                                              inputs: { table: this }"
            />
        </div>
    }

    <div class="wrapper"
         [style.height]="getTableHeight()"
    >
        <table tuiTable
               [columns]="columnsNames"
        >
            <thead>
                <tr tuiThGroup>
                    @for (column of columns; track column.name) {
                        <th tuiTh
                            [resizable]="column.resizable ?? true"
                            [ngStyle]="{
                                'textAlign': column.headerStyles?.alignment ?? 'left',
                                'width': getColumnWidth(column.headerStyles?.width)
                            }"
                        >
                            @if (column.name === 'selection' && selectionRequired) {
                                <input
                                    tuiCheckbox
                                    type="checkbox"
                                    [tuiHint]="Sftoomi.Translator.translate('select_all')"
                                    [ngModel]="checked"
                                    (ngModelChange)="onCheck($event)"
                                />
                            } @else {
                                {{ column.caption }}
                            }
                        </th>
                    }
                </tr>
            </thead>
            <tbody tuiTbody
                   [data]="data()"
            >
                <tr
                    *ngFor="let row of data()"
                    tuiTr
                >
                    <ng-container *ngFor="let col of columns">
                        <td *tuiCell="col.name"
                            tuiTd
                            [ngStyle]="{
                                'textAlign': col.styles?.alignment ?? 'left',
                                'width': getColumnWidth(col.styles?.width)
                            }"
                        >
                            @if (col.name === 'selection' && selectionRequired) {
                                <input
                                    tuiCheckbox
                                    type="checkbox"
                                    [(ngModel)]="row.selected"
                                />
                            } @else {
                                <div [innerHTML]="row[col.name]"
                                     [ngStyle]="{
                                        'height': getColumnHeight(col.styles?.height),
                                     }"
                                     style="overflow: auto; display: flex; flex-direction: column; justify-content: center;"
                                >
                                </div>
                            }
                        </td>
                    </ng-container>
                </tr>
            </tbody>
        </table>
    </div>

    @if (paginatorRequired) {
        <div class="footer"
             [style.height]="footerHeight"
        >
            <caption tuiCaption>
                <button
                    appearance="flat"
                    tuiButton
                    tuiButtonSelect
                    type="button"
                    [(ngModel)]="itemsPerPage"
                >
                    {{ pageSizeCaption }}
                    <tui-data-list-wrapper
                        *tuiTextfieldDropdown
                        (itemClick)="onPageSizeChange($event)"
                        [itemContent]="content"
                        [items]="items"
                    />
                </button>
            </caption>

            <tui-pagination
                [length]="totalPagesCount"
                [index]="currentPageIndex"
                (indexChange)="onPageChange($event)"
            ></tui-pagination>
        </div>
    }
</tui-loader>
