<nz-layout class="app-layout">
    <nz-header>
        <div class="logo">
            <a [routerLink]="RoutesPaths.HOME">
                <img src="https://ng.ant.design/assets/img/logo.svg" alt="logo">
                <h1>SFTOOMI</h1>
            </a>
        </div>
        <ul nz-menu class="top-nav" nzTheme="dark" nzMode="horizontal">
            <li nz-menu-item
                nzMatchRouter
                [nzSelected]="isRouteSelected(RoutesPaths.PATIENTS)"
                [routerLink]="RoutesPaths.PATIENTS"
            >
                {{ Sftoomi.Translator.translate('navigation.patients') }}
            </li>
        </ul>
    </nz-header>
    <nz-content>
        <div class="inner-content">
            <router-outlet></router-outlet>
        </div>
    </nz-content>
</nz-layout>
