<nz-layout class="app-layout">
    <app-loading-spinner [isLoading]="isLoading()" />
    @if (Sftoomi.Auth.getIsAuthorizedSignal()()) {
        <app-navigation-panel [isLoading]="isLoading"/>
    }

    <nz-content>
        <div class="inner-content"
             [class.inner-content-padding]="Sftoomi.Auth.getIsAuthorizedSignal()()"
             [class.inner-content-padding-mobile]="Sftoomi.Auth.getIsAuthorizedSignal()() && responsiveLayoutService.isSmallWidth()"
        >
            <router-outlet></router-outlet>
        </div>
    </nz-content>
</nz-layout>
