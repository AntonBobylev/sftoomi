services:
    server:
        image: nginx:stable-alpine
        ports:
            - "8080:80"
        volumes:
            - ./app:/var/www/project
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
            - mysql
        networks:
            - server-php-mysql

    php:
        build:
            context: .
            dockerfile: ./php/Dockerfile
        ports:
            - "9000:9000"
        volumes:
            - ./app:/var/www/project
        networks:
            - server-php-mysql

    mysql:
        image: mysql:8
        ports:
            - "4306:3306"
        volumes:
            -   ./mysql:/var/lib/mysql
        command: --mysql-native-password=ON --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        #restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        networks:
            - server-php-mysql


networks:
    server-php-mysql:
